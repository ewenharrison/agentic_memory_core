name: Tier 2 Cloud Maintenance

on:
  workflow_dispatch:
    inputs:
      project_slug:
        description: "Project slug to maintain"
        required: true
        default: "sample-project"
      agent_mode:
        description: "Agent mode to run: general, context_scout, or synthesis_agent. literature_scout is reserved until real external search exists."
        required: false
        default: "general"
      task_prompt:
        description: "What the cloud run should attempt"
        required: false
        default: "Refresh Tier 2 working memory and capture any administrative decisions."

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: tier2-cloud-maintenance
  cancel-in-progress: false

jobs:
  tier2-cloud-run:
    runs-on: windows-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
      OPENAI_REASONING_EFFORT: ${{ vars.OPENAI_REASONING_EFFORT }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Resolve workflow inputs
        shell: pwsh
        run: |
          $project = "${{ github.event.inputs.project_slug }}"
          if ([string]::IsNullOrWhiteSpace($project)) {
            $project = "sample-project"
          }

          $agentMode = "${{ github.event.inputs.agent_mode }}"
          if ([string]::IsNullOrWhiteSpace($agentMode)) {
            $agentMode = "general"
          }

          $prompt = "${{ github.event.inputs.task_prompt }}"
          if ([string]::IsNullOrWhiteSpace($prompt)) {
            $prompt = "Refresh Tier 2 working memory and capture any administrative decisions."
          }

          "PROJECT_SLUG=$project" >> $env:GITHUB_ENV
          "AGENT_MODE=$agentMode" >> $env:GITHUB_ENV
          "RUN_MODE=${{ github.event_name }}" >> $env:GITHUB_ENV

          $delimiter = [guid]::NewGuid().ToString()
          "TASK_PROMPT<<$delimiter" >> $env:GITHUB_ENV
          $prompt >> $env:GITHUB_ENV
          $delimiter >> $env:GITHUB_ENV

      - name: Run Tier 2 cloud task scaffold
        shell: pwsh
        run: |
          .\scripts\run-tier2-cloud-task.ps1 `
            -Project $env:PROJECT_SLUG `
            -AgentMode $env:AGENT_MODE `
            -TaskPrompt $env:TASK_PROMPT `
            -RunMode $env:RUN_MODE

      - name: Detect repo changes
        id: changes
        shell: pwsh
        run: |
          $hasChanges = if ((git status --porcelain).Length -gt 0) { "true" } else { "false" }
          "has_changes=$hasChanges" >> $env:GITHUB_OUTPUT

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "tier2: record ${{ env.AGENT_MODE }} run for ${{ env.PROJECT_SLUG }}"
          branch: "tier2/${{ env.PROJECT_SLUG }}-${{ github.run_id }}"
          title: "tier2: ${{ env.AGENT_MODE }} run for ${{ env.PROJECT_SLUG }}"
          body: |
            This PR was opened automatically by the generic Tier 2 cloud-maintenance workflow.

            Run mode: `${{ env.RUN_MODE }}`
            Project: `${{ env.PROJECT_SLUG }}`
            Agent mode: `${{ env.AGENT_MODE }}`
            Prompt:
            `${{ env.TASK_PROMPT }}`

            The workflow generated a provisional Tier 2 note for the selected project, updated the autonomous index, and appended the activity log.
            Review the note before merging because Tier 2 output is exploratory rather than canonical by default.
